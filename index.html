<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>共同基金 | 雲端同步版 v4.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-bg: #F2F2F7;
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            --notion-text: #37352F;
            --notion-sub: #73726E;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', -apple-system, sans-serif;
            background-color: var(--apple-bg);
            color: var(--notion-text);
            -webkit-font-smoothing: antialiased;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .apple-card { background: #FFFFFF; border-radius: 24px; box-shadow: var(--card-shadow); overflow: hidden; }
        .notion-input { background-color: #F7F7F7; border: 1px solid transparent; border-radius: 12px; padding: 12px 16px; width: 100%; outline: none; transition: all 0.2s ease; }
        .notion-input:focus { background-color: #FFFFFF; border-color: #E5E7EB; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.08); }

        .member-tag { background: #F9FAFB; border: 1px solid #E5E7EB; color: var(--notion-sub); border-radius: 10px; font-size: 11px; font-weight: 600; display: flex; align-items: center; transition: all 0.2s; }
        .member-name-btn { padding: 5px 4px 5px 12px; cursor: pointer; flex-grow: 1; }
        .delete-btn { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: #D1D5DB; cursor: pointer; }
        .delete-btn:hover { background: #FEE2E2; color: #EF4444; }

        .inline-add-input { background: transparent; border-bottom: 1.5px dashed #D1D5DB; font-size: 11px; padding: 4px 6px; width: 90px; outline: none; transition: all 0.3s; color: var(--notion-sub); }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 13px; cursor: pointer; position: relative; transition: 0.2s; }
        .calendar-day.active { background-color: var(--notion-text) !important; color: white; font-weight: 600; }
        .calendar-day.has-data::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--apple-blue); border-radius: 50%; }

        .btn-primary { background: var(--notion-text); color: white; border-radius: 14px; font-weight: 600; padding: 16px; width: 100%; transition: all 0.2s; }
        .btn-primary:disabled { opacity: 0.5; cursor: wait; }
        .tag-btn { padding: 6px 14px; border-radius: 50px; font-size: 11px; font-weight: 600; background: #E5E7EB; color: var(--notion-sub); }
        .tag-btn.active { background: var(--notion-text); color: white; }
        
        #syncOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s; }
        .hidden { display: none !important; }
        .spinner { width: 32px; height: 32px; border: 3px solid #f3f3f3; border-top: 3px solid var(--apple-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <div id="syncOverlay">
        <div class="spinner"></div>
        <p class="text-xs font-bold text-gray-500 tracking-widest uppercase">Connecting to Cloud...</p>
    </div>

    <div class="w-full max-w-md space-y-8">
        <header class="pt-4 space-y-4">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.2em] mb-1">Google Sheet API</p>
                    <h1 class="text-3xl font-bold tracking-tight">共同基金</h1>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-gray-400 font-bold uppercase mb-1">目前結餘</p>
                    <p id="totalBalanceHeader" class="text-2xl font-bold text-gray-800">$ 0</p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-2 pt-2 border-t border-gray-100/50">
                <div id="memberTagsList" class="flex flex-wrap gap-2"></div>
                <div class="flex items-center ml-1">
                    <input type="text" id="newMemberName" class="inline-add-input" placeholder="+ 新增成員" onkeypress="if(event.key==='Enter') addMember()">
                </div>
            </div>
        </header>

        <section class="apple-card p-6 space-y-6">
            <div class="flex justify-between items-center gap-3">
                <select id="filterPeriod" class="text-[11px] font-bold bg-gray-50 border border-gray-100 px-4 py-2 rounded-full outline-none" onchange="handlePeriodChange()">
                    <option value="all">全部數據</option>
                    <option value="today">今日統計</option>
                    <option value="week">本週統計</option>
                    <option value="month">本月統計</option>
                </select>
                <select id="filterUser" class="text-[11px] font-bold bg-gray-50 border border-gray-100 px-4 py-2 rounded-full outline-none" onchange="renderAll()">
                    <option value="all">所有人</option>
                </select>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center px-1">
                    <button onclick="changeMonth(-1)" class="text-gray-300">◀</button>
                    <h3 id="calendarTitle" class="text-[10px] font-bold uppercase tracking-[0.15em] text-gray-400">Loading...</h3>
                    <button onclick="changeMonth(1)" class="text-gray-300">▶</button>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-y-1 text-center text-[10px] font-bold text-gray-300">
                    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                </div>
            </div>

            <div class="pt-4 flex flex-col items-center border-t border-gray-50">
                <div class="flex gap-2 mb-6 bg-gray-50 p-1 rounded-full">
                    <button onclick="setChartType('expense')" id="btnTypeExp" class="tag-btn active">支出</button>
                    <button onclick="setChartType('income')" id="btnTypeInc" class="tag-btn">進帳</button>
                </div>
                <div class="h-48 w-full relative flex items-center justify-center">
                    <div class="absolute flex flex-col items-center pointer-events-none text-center">
                        <span id="chartLabel" class="text-[9px] text-gray-400 uppercase font-bold tracking-tighter">總額</span>
                        <span id="chartCenterTotal" class="text-2xl font-bold text-gray-800">--</span>
                        <span id="jointShareHint" class="text-[10px] text-blue-500 font-bold mt-1">人均 $0</span>
                    </div>
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </section>

        <section class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider">數據摘要</h2>
                <div class="flex items-center gap-2">
                    <span id="periodBadge" class="text-[9px] bg-white border border-gray-100 text-gray-400 px-2 py-0.5 rounded font-bold">全部</span>
                    <span id="statementNet" class="text-sm font-bold">$ 0</span>
                </div>
            </div>
            <div id="statementContent" class="space-y-2"></div>
        </section>

        <section class="apple-card p-6 space-y-6" id="formAnchor">
            <div class="flex justify-between items-center">
                <h3 id="formTitle" class="text-lg font-bold">新增交易</h3>
                <span id="editIndicator" class="hidden text-[10px] bg-red-50 text-red-500 px-2 py-1 rounded font-bold tracking-widest">EDITING</span>
            </div>

            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 px-1">紀錄人</label>
                        <select id="inputUser" class="notion-input"></select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 px-1">類型</label>
                        <select id="inputType" class="notion-input" onchange="toggleFormUI()">
                            <option value="expense">支出項目</option>
                            <option value="income">進帳項目</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 px-1">分類</label>
                        <select id="inputCategory" class="notion-input"></select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 px-1">品項</label>
                        <input type="text" id="inputTitle" class="notion-input" placeholder="晚餐、油錢...">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 px-1">金額</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-gray-300">$</span>
                        <input type="number" id="inputAmount" class="notion-input pl-10 text-xl font-bold" placeholder="0">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="inputDate" class="notion-input text-xs">
                    <input type="time" id="inputTime" class="notion-input text-xs">
                </div>

                <div class="pt-2">
                    <button id="saveBtn" onclick="saveRecord()" class="btn-primary">儲存雲端紀錄</button>
                    <button id="cancelEditBtn" onclick="cancelEdit()" class="hidden w-full text-xs font-bold text-gray-400 mt-4">取消編輯</button>
                </div>
            </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider px-2">歷史紀錄</h2>
            <div id="historyList" class="space-y-3"></div>
            <button onclick="resetFilter()" id="resetBtn" class="hidden w-full py-3 text-xs font-bold text-blue-500 bg-white rounded-xl border border-gray-100">清除篩選</button>
        </section>

        <footer class="text-center py-12">
            <p class="text-[9px] text-gray-300 font-bold tracking-[0.3em] uppercase">Cloud Ledger Sync • v4.8</p>
        </footer>
    </div>

    <script>
        // 核心 API 網址
        const API_URL = 'https://script.google.com/macros/s/AKfycbyhKo90FVQaM47spz6uRrqdIiyybVkX1MHOViJfJMHUQfo7hjGosCpO24fpHg3EnFwy/exec';

        let records = [];
        let members = [];
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDate = null;
        let editingId = null;
        let chartType = 'expense'; 
        let mainChart = null;

        const EXPENSE_CATS = ['飲食', '交通', '娛樂', '日常', '其他'];
        const INCOME_CATS = ['薪資', '獎金', '投資', '零用', '其他'];

        window.onload = async () => {
            await fetchCloudData();
            initDateInputs();
            toggleFormUI();
            updateMemberUI();
            renderAll();
        };

        function initDateInputs() {
            const today = new Date();
            document.getElementById('inputDate').value = today.toISOString().split('T')[0];
            document.getElementById('inputTime').value = today.toTimeString().slice(0, 5);
        }

        async function fetchCloudData() {
            showSyncOverlay(true);
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.error) {
                    alert("⚠️ 錯誤：" + data.error);
                } else {
                    records = data.records || [];
                    members = data.members || [];
                }
            } catch (e) {
                console.error("API Error:", e);
                alert("❌ 連線失敗！請確保：\n1. 試算表分頁名為 Records 與 Members\n2. 部署時權限選「所有人」\n3. 已經按了「儲存」按鈕");
            } finally {
                showSyncOverlay(false);
            }
        }

        async function saveRecord() {
            const amt = parseFloat(document.getElementById('inputAmount').value);
            const user = document.getElementById('inputUser').value;
            if (!amt || !user) { alert("請輸入金額與紀錄人"); return; }

            showSyncOverlay(true);
            const data = {
                id: editingId || Date.now(),
                user: user,
                type: document.getElementById('inputType').value,
                title: document.getElementById('inputTitle').value || '未命名',
                category: document.getElementById('inputCategory').value,
                amount: amt,
                date: document.getElementById('inputDate').value,
                time: document.getElementById('inputTime').value,
                isJoint: true 
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'saveRecord', data: data })
                });
                
                setTimeout(async () => {
                    await fetchCloudData();
                    cancelEdit();
                    renderAll();
                }, 1500);
            } catch (e) {
                alert("儲存失敗");
                showSyncOverlay(false);
            }
        }

        async function deleteRecord(id) {
            if(!confirm("確定刪除此筆紀錄？")) return;
            showSyncOverlay(true);
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'deleteRecord', id: id })
                });
                setTimeout(async () => {
                    await fetchCloudData();
                    renderAll();
                }, 1500);
            } catch (e) {
                alert("刪除失敗");
                showSyncOverlay(false);
            }
        }

        async function addMember() {
            const nameInput = document.getElementById('newMemberName');
            const name = nameInput.value.trim();
            if (name && !members.includes(name)) {
                members.push(name);
                nameInput.value = '';
                showSyncOverlay(true);
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'updateMembers', members: members })
                });
                setTimeout(async () => {
                    await fetchCloudData();
                    updateMemberUI();
                    renderAll();
                }, 1200);
            }
        }

        async function removeMember(name) {
            if(!confirm(`移除成員 ${name}？`)) return;
            members = members.filter(m => m !== name);
            showSyncOverlay(true);
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'updateMembers', members: members })
            });
            setTimeout(async () => {
                await fetchCloudData();
                updateMemberUI();
                renderAll();
            }, 1200);
        }

        // --- 介面控制 ---

        function showSyncOverlay(show) {
            const overlay = document.getElementById('syncOverlay');
            if (show) overlay.classList.remove('hidden');
            else overlay.classList.add('hidden');
        }

        function updateMemberUI() {
            const filterUser = document.getElementById('filterUser');
            const inputUser = document.getElementById('inputUser');
            const tagsList = document.getElementById('memberTagsList');
            
            const currentFilter = filterUser.value;
            const currentInput = inputUser.value;

            let options = members.map(m => `<option value="${m}">${m}</option>`).join('');
            filterUser.innerHTML = `<option value="all">檢視所有人</option>` + options;
            inputUser.innerHTML = options || `<option value="">請先新增成員</option>`;

            if (members.includes(currentFilter)) filterUser.value = currentFilter;
            if (members.includes(currentInput)) inputUser.value = currentInput;

            tagsList.innerHTML = '';
            members.forEach(m => {
                const tag = document.createElement('div');
                tag.className = 'member-tag';
                tag.innerHTML = `<div class="member-name-btn">${m}</div><div class="delete-btn" onclick="removeMember('${m}')">✕</div>`;
                tagsList.appendChild(tag);
            });
        }

        function renderAll() {
            renderSummary();
            renderCalendar();
            renderChart();
            renderStatement();
            renderHistory();
        }

        function getFilteredData() {
            const period = document.getElementById('filterPeriod').value;
            const userFilter = document.getElementById('filterUser').value;
            let data = [...records];
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            if (selectedDate) {
                data = data.filter(r => r.date === selectedDate);
                document.getElementById('periodBadge').innerText = selectedDate.replace(/-/g, '/');
            } else {
                if (period === 'today') data = data.filter(r => r.date === todayStr);
                else if (period === 'week') {
                    const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                    data = data.filter(r => new Date(r.date) >= weekAgo);
                } else if (period === 'month') {
                    data = data.filter(r => {
                        const rd = new Date(r.date);
                        return rd.getMonth() === now.getMonth() && rd.getFullYear() === now.getFullYear();
                    });
                }
                document.getElementById('periodBadge').innerText = document.getElementById('filterPeriod').selectedOptions[0].text;
            }
            if (userFilter !== 'all') data = data.filter(r => r.user === userFilter);
            return data;
        }

        function renderSummary() {
            const income = records.filter(r => r.type === 'income').reduce((s, r) => s + (Number(r.amount)||0), 0);
            const expense = records.filter(r => r.type === 'expense').reduce((s, r) => s + (Number(r.amount)||0), 0);
            document.getElementById('totalBalanceHeader').innerText = `$ ${(income - expense).toLocaleString()}`;
        }

        function renderStatement() {
            const data = getFilteredData();
            const container = document.getElementById('statementContent');
            let contentHtml = '';
            let tExp = 0, tInc = 0;
            const summary = {};
            data.forEach(r => {
                const amt = Number(r.amount) || 0;
                const key = `${r.type === 'expense' ? '支出' : '進帳'} · ${r.category}`;
                summary[key] = (summary[key] || 0) + amt;
                if (r.type === 'expense') tExp += amt; else tInc += amt;
            });
            Object.entries(summary).forEach(([label, amt]) => {
                const isExp = label.startsWith('支出');
                contentHtml += `
                    <div class="flex justify-between py-2 px-4 bg-white rounded-xl border border-gray-50 shadow-sm">
                        <span class="text-[10px] font-bold text-gray-400">${label}</span>
                        <span class="text-xs font-bold ${isExp ? 'text-red-500' : 'text-green-500'}">${isExp ? '-' : '+'}$${amt.toLocaleString()}</span>
                    </div>`;
            });
            container.innerHTML = contentHtml || '<div class="text-center py-4 text-[10px] text-gray-300 italic">No Data</div>';
            const net = tInc - tExp;
            document.getElementById('statementNet').innerText = `${net >= 0 ? '+' : ''}$${Math.round(net).toLocaleString()}`;
            document.getElementById('statementNet').className = `text-sm font-bold ${net >= 0 ? 'text-green-500' : 'text-red-500'}`;
        }

        function renderChart() {
            const data = getFilteredData().filter(r => r.type === chartType);
            const cats = chartType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
            const chartValues = cats.map(c => data.filter(r => r.category === c).reduce((s, r) => s + (Number(r.amount)||0), 0));
            const total = chartValues.reduce((a, b) => a + b, 0);
            document.getElementById('chartCenterTotal').innerText = `$ ${Math.round(total).toLocaleString()}`;
            document.getElementById('jointShareHint').innerText = `人均 $${Math.round(total / (members.length || 1)).toLocaleString()}`;
            
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            mainChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: cats, datasets: [{ data: chartValues, backgroundColor: chartType === 'expense' ? ['#FF3B30', '#007AFF', '#34C759', '#FF9500', '#AF52DE'] : ['#34C759', '#007AFF', '#FFCC00', '#AF52DE', '#8E8E93'], borderWidth: 3, borderColor: '#FFFFFF' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '84%' }
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '<span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>';
            const first = new Date(currentYear, currentMonth, 1).getDay();
            const days = new Date(currentYear, currentMonth + 1, 0).getDate();
            document.getElementById('calendarTitle').innerText = `${currentYear}年 ${currentMonth + 1}月`;
            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const dStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasData = records.some(r => r.date === dStr);
                const dayEl = document.createElement('div');
                dayEl.className = `calendar-day ${hasData ? 'has-data' : ''} ${selectedDate === dStr ? 'active' : ''}`;
                dayEl.innerText = d;
                dayEl.onclick = () => { selectedDate = (selectedDate === dStr ? null : dStr); renderAll(); };
                grid.appendChild(dayEl);
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            let data = getFilteredData();
            data.sort((a,b) => new Date(b.date + ' ' + b.time) - new Date(a.date + ' ' + a.time));
            data.slice(0, 15).forEach(r => {
                const isExp = r.type === 'expense';
                const card = document.createElement('div');
                card.className = "apple-card p-4 flex justify-between items-center active:scale-95 transition-all";
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex items-center gap-2"><span class="text-sm font-bold text-gray-800">${r.title}</span><span class="text-[9px] bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded font-bold">${r.category}</span></div>
                        <p class="text-[10px] text-gray-300 mt-1">${r.date} · ${r.user}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold ${isExp ? 'text-red-500' : 'text-green-500'} text-sm">${isExp ? '-' : '+'}$${Number(r.amount).toLocaleString()}</p>
                        <div class="flex gap-4 justify-end mt-1">
                            <button onclick="editRecord(${r.id})" class="text-[10px] font-bold text-blue-500">編輯</button>
                            <button onclick="deleteRecord(${r.id})" class="text-[10px] font-bold text-gray-200">刪除</button>
                        </div>
                    </div>`;
                list.appendChild(card);
            });
            document.getElementById('resetBtn').classList.toggle('hidden', !selectedDate && document.getElementById('filterPeriod').value === 'all');
        }

        function editRecord(id) {
            const r = records.find(x => x.id == id);
            editingId = id;
            document.getElementById('saveBtn').innerText = "更新雲端資料";
            document.getElementById('editIndicator').classList.remove('hidden');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('inputUser').value = r.user;
            document.getElementById('inputType').value = r.type;
            toggleFormUI();
            document.getElementById('inputCategory').value = r.category;
            document.getElementById('inputAmount').value = r.amount;
            document.getElementById('inputTitle').value = r.title;
            document.getElementById('inputDate').value = r.date;
            document.getElementById('inputTime').value = r.time;
            window.scrollTo({ top: document.getElementById('formAnchor').offsetTop - 20, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('saveBtn').innerText = "儲存雲端紀錄";
            document.getElementById('editIndicator').classList.add('hidden');
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('formTitle').innerText = "新增交易";
            document.getElementById('inputAmount').value = "";
            document.getElementById('inputTitle').value = "";
            initDateInputs();
        }

        function toggleFormUI() {
            const type = document.getElementById('inputType').value;
            const cats = type === 'expense' ? EXPENSE_CATS : INCOME_CATS;
            document.getElementById('inputCategory').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function changeMonth(s) { currentMonth += s; if(currentMonth>11){currentMonth=0;currentYear++} if(currentMonth<0){currentMonth=11;currentYear--} renderCalendar(); }
        function handlePeriodChange() { selectedDate = null; renderAll(); }
        function setChartType(t) { chartType = t; document.getElementById('btnTypeExp').classList.toggle('active', t==='expense'); document.getElementById('btnTypeInc').classList.toggle('active', t==='income'); renderChart(); }
        function resetFilter() { selectedDate = null; document.getElementById('filterPeriod').value = 'all'; renderAll(); }

    </script>
</body>
</html>
